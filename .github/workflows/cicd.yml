name: Build and Deploy with Kaniko in AKS

on:
  workflow_dispatch:
    # This workflow is disabled (replaced by deploy.yml).
    # Run manually only if needed for Kaniko-based builds.

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Azure login using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group my-rg \
            --name my-aks \
            --overwrite-existing

      - name: Apply Kaniko build job
        run: |
          kubectl apply -f k8s/kaniko-job.yaml

      - name: Wait for Kaniko job to complete
        run: |
          kubectl wait --for=condition=complete job/kaniko-build -n demo --timeout=600s

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/deployment.yaml -n demo
          
